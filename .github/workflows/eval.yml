name: Eval Benchmark

on:
  push:
    branches: [main]
    paths:
      - "src/patrick/**"
      - "scripts/eval.py"
      - "tests/eval/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Search mode (vector or hybrid)"
        required: false
        default: "vector"

jobs:
  eval:
    name: Run eval benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[eval]"
          pip install rank-bm25 sentence-transformers

      - name: Verify annotated queries
        run: |
          python -c "
          import json; lines = open('tests/eval/queries.jsonl').readlines()
          annotated = sum(1 for l in lines if json.loads(l).get('relevant_chunk_ids'))
          assert annotated == 30, f'Only {annotated}/30 annotated — CI blocked'
          "

      - name: Run eval (vector mode)
        run: |
          python scripts/eval.py \
            --mode vector \
            --output results/ci_vector_$(git rev-parse --short HEAD).json \
            --verbose

      - name: Run eval (hybrid mode)
        run: |
          python scripts/eval.py \
            --mode hybrid \
            --output results/ci_hybrid_$(git rev-parse --short HEAD).json \
            --verbose

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: results/
          retention-days: 90
